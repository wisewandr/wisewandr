<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="900" viewBox="0 0 680 900" xmlns="http://www.w3.org/2000/svg">
<title>SoloWandr — Official Logo Suite</title>
<desc>
  SoloWandr final logo suite.
  Tagline: Travel Solo and Know
  Primary brand color: Terracotta #C4622D
  All variants: light, dark, terracotta, stacked, icon-only
  Use this file to export PNG icons at any size.
</desc>

<!-- ═══════════════════════════════════════════════ -->
<!--  PRIMARY WORDMARK — light background           -->
<!--  Recommended for: website header, letterhead,  -->
<!--  email signatures, light-mode app header       -->
<!-- ═══════════════════════════════════════════════ -->
<g id="wordmark-light">
  <rect x="40" y="42" width="600" height="130" rx="18" fill="#FBF8F2" stroke="#E8D5B8" stroke-width="1"/>
  <!-- Icon mark -->
  <rect x="68" y="67" width="80" height="80" rx="19" fill="#C4622D"/>
  <rect x="88" y="89" width="40" height="34" rx="6" fill="#FBF8F2"/>
  <path d="M97 89 Q97 78 108 78 Q119 78 119 89" fill="none" stroke="#FBF8F2" stroke-width="4" stroke-linecap="round"/>
  <rect x="88" y="104" width="40" height="5" fill="#C4622D"/>
  <rect x="97" y="100" width="7" height="12" rx="2.5" fill="#C4622D"/>
  <circle cx="108" cy="106.5" r="2.8" fill="#FBF8F2"/>
  <rect x="93" y="122" width="5" height="4" rx="2" fill="#D4794A"/>
  <rect x="118" y="122" width="5" height="4" rx="2" fill="#D4794A"/>
  <!-- Wordmark -->
  <text x="168" y="107" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" fill="#2C1F14" letter-spacing="-1.5">Solo<tspan fill="#C4622D">Wandr</tspan></text>
  <!-- Tagline -->
  <text x="171" y="133" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-style="italic" fill="#7A6050" letter-spacing="0.5">Travel Solo and Know</text>
</g>

<!-- ═══════════════════════════════════════════════ -->
