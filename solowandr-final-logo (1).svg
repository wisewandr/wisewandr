<!-- ═══════════════════════════════════════════════ -->
<g id="wordmark-dark">
  <rect x="40" y="236" width="600" height="130" rx="18" fill="#2C1F14"/>
  <rect x="68" y="261" width="80" height="80" rx="19" fill="#C4622D"/>
  <rect x="88" y="283" width="40" height="34" rx="6" fill="#FBF8F2"/>
