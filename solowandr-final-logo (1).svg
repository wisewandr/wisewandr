  <rect x="88" y="298" width="40" height="5" fill="#C4622D"/>
  <rect x="97" y="294" width="7" height="12" rx="2.5" fill="#C4622D"/>
  <circle cx="108" cy="300.5" r="2.8" fill="#FBF8F2"/>
  <rect x="93" y="316" width="5" height="4" rx="2" fill="#D4794A"/>
  <rect x="118" y="316" width="5" height="4" rx="2" fill="#D4794A"/>
