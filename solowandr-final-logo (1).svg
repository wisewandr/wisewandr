<!-- ═══════════════════════════════════════════════ -->
<!--  ICON MARK — 96px (primary PWA / app icon)     -->
<!--  To export at 512px: open in browser, save as  -->
<!--  SVG, then use Squoosh or ImageMagick to       -->
<!--  export PNG at 512×512, 192×192, 96×96, 72×72  -->
<!-- ═══════════════════════════════════════════════ -->
<g id="icon-96-terra">
  <rect x="40" y="696" width="96" height="96" rx="22" fill="#C4622D"/>
  <rect x="60" y="718" width="56" height="46" rx="8" fill="#FBF8F2"/>
  <path d="M71 718 Q71 705 80 705 Q89 705 89 718" fill="none" stroke="#FBF8F2" stroke-width="5" stroke-linecap="round"/>
  <rect x="60" y="735" width="56" height="7" fill="#C4622D"/>
  <rect x="71" y="729" width="9" height="15" rx="3" fill="#C4622D"/>
  <circle cx="82" cy="738.5" r="3.5" fill="#FBF8F2"/>
  <rect x="66" y="758" width="7" height="5" rx="2" fill="#D4794A"/>
  <rect x="99" y="758" width="7" height="5" rx="2" fill="#D4794A"/>
</g>

<!-- ═══════════════════════════════════════════════ -->
<!--  BRAND COLOR PALETTE — reference swatch        -->
<!-- ═══════════════════════════════════════════════ -->
<g id="brand-colors">
  <!-- Terracotta — primary brand color -->
  <rect x="40"  y="852" width="76" height="30" rx="8" fill="#C4622D"/>
  <!-- Bark — primary text -->
  <rect x="130" y="852" width="76" height="30" rx="8" fill="#2C1F14"/>
  <!-- Linen — background -->
  <rect x="220" y="852" width="76" height="30" rx="8" fill="#FBF8F2" stroke="#E8D5B8" stroke-width="1"/>
  <!-- Sand — borders, dividers -->
  <rect x="310" y="852" width="76" height="30" rx="8" fill="#E8D5B8"/>
  <!-- Moss — safety, success -->
  <rect x="400" y="852" width="76" height="30" rx="8" fill="#3A7038"/>
  <!-- Sky — information, nomad -->
  <rect x="490" y="852" width="76" height="30" rx="8" fill="#2A6898"/>
  <!-- Gold — premium, warnings -->
  <rect x="580" y="852" width="60" height="30" rx="8" fill="#B88828"/>
</g>

</svg>
